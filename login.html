<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guitarra Studio — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="login.css">
</head>
<body>

<div class="login-card">

  <!-- Ícone -->
  <div class="login-icon-wrap">🎸</div>

  <div class="login-title">Guitarra Studio</div>
  <div class="login-sub">Seu diário de prática e evolução</div>

  <!-- Toggle Entrar / Criar conta -->
  <div class="tab-toggle" id="tab-toggle">
    <div class="tab-slider"></div>
    <button class="tab-btn active" onclick="switchTab('login')">Entrar</button>
    <button class="tab-btn" onclick="switchTab('register')">Criar conta</button>
  </div>

  <!-- PAINEL LOGIN -->
  <div id="login-panel">

    <div class="login-field">
      <label for="email">E-mail</label>
      <input class="login-input" type="email" id="email" placeholder="seu@email.com" autocomplete="email">
    </div>

    <div class="login-field">
      <div class="login-field-header">
        <label for="password">Senha</label>
        <a href="#" class="forgot-link">Esqueci minha senha</a>
      </div>
      <div class="input-wrap">
        <input class="login-input has-toggle" type="password" id="password" placeholder="Sua senha" autocomplete="current-password">
        <button class="pw-toggle" onclick="togglePw('password', this)" tabindex="-1" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn-login-primary" onclick="handleLogin()">Entrar</button>

    <div class="login-divider">ou</div>

    <button class="btn-google" onclick="handleGoogle()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continuar com Google
    </button>

    <div class="login-footer">
      Não tem conta? <a href="#" onclick="switchTab('register');return false;">Criar conta grátis</a>
    </div>
    <a class="login-offline" href="#" onclick="useOffline();return false;">Usar sem conta (dados locais apenas)</a>

  </div>

  <!-- PAINEL CRIAR CONTA -->
  <div id="register-panel">

    <div class="login-field">
      <label for="reg-name">Nome</label>
      <input class="login-input" type="text" id="reg-name" placeholder="Seu nome" autocomplete="name">
    </div>

    <div class="login-field">
      <label for="reg-email">E-mail</label>
      <input class="login-input" type="email" id="reg-email" placeholder="seu@email.com" autocomplete="email">
    </div>

    <div class="login-field">
      <label for="reg-password">Senha</label>
      <div class="input-wrap">
        <input class="login-input has-toggle" type="password" id="reg-password" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
        <button class="pw-toggle" onclick="togglePw('reg-password', this)" tabindex="-1" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn-login-primary" onclick="handleRegister()">Criar conta</button>

    <div class="login-divider">ou</div>

    <button class="btn-google" onclick="handleGoogle()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continuar com Google
    </button>

    <div class="login-footer">
      Já tem conta? <a href="#" onclick="switchTab('login');return false;">Entrar</a>
    </div>

  </div>

</div>

<script>
  const EYE_OPEN   = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  const EYE_CLOSED = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';

  function switchTab(tab) {
    const toggle    = document.getElementById('tab-toggle');
    const loginP    = document.getElementById('login-panel');
    const registerP = document.getElementById('register-panel');
    const btns      = document.querySelectorAll('.tab-btn');
    if (tab === 'login') {
      toggle.classList.remove('on-register');
      loginP.style.display    = 'block';
      registerP.style.display = 'none';
      btns[0].classList.add('active');
      btns[1].classList.remove('active');
    } else {
      toggle.classList.add('on-register');
      loginP.style.display    = 'none';
      registerP.style.display = 'block';
      btns[0].classList.remove('active');
      btns[1].classList.add('active');
    }
  }

  function togglePw(inputId, btn) {
    const input   = document.getElementById(inputId);
    const showing = input.type === 'text';
    input.type    = showing ? 'password' : 'text';
    btn.querySelector('svg').innerHTML = showing ? EYE_OPEN : EYE_CLOSED;
  }

  function handleLogin() {
    if (typeof AUTH !== 'undefined') AUTH.loginEmail?.(
      document.getElementById('email').value,
      document.getElementById('password').value
    );
  }

  function handleRegister() {
    // integrar com Firebase createUserWithEmailAndPassword
  }

  function handleGoogle() {
    if (typeof AUTH !== 'undefined') AUTH.loginGoogle();
  }

  function useOffline() {
    // integrar com useOffline() do app.js
  }
</script>

</body>
</html>
